name: TestFlight

# Builds the iOS IPA and uploads to App Store Connect / TestFlight.
# MANUAL TRIGGER ONLY (workflow_dispatch): uploads are deliberate releases,
# not merge side effects — every upload burns a build number and notifies
# testers, so Nick decides when one goes out (2026-06-12 decision; three
# auto-uploads in one morning prompted it). Run from the Actions tab or:
#   gh workflow run testflight.yml --ref main
#
# Required repository secrets (see docs/testflight-ci.md):
#   APP_STORE_CONNECT_API_KEY_ID       — App Store Connect API key ID (e.g. AZ4F82S7XD)
#   APP_STORE_CONNECT_ISSUER_ID        — Issuer ID UUID
#   APP_STORE_CONNECT_API_KEY_CONTENT  — base64-encoded contents of the .p8 key file
#   KEYCHAIN_PASSWORD                  — ephemeral password for the temporary build keychain
#   IOS_CERTIFICATE_P12_BASE64         — base64-encoded Apple distribution .p12 cert
#   IOS_CERTIFICATE_P12_PASSWORD       — password protecting the .p12 cert
#   IOS_PROVISIONING_PROFILE_BASE64    — base64-encoded App Store provisioning profile (.mobileprovision)

on:
  workflow_dispatch:

# Avoid concurrent uploads racing for the same build number.
concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build IPA and upload to TestFlight
    # macos-15 ships Xcode 16 (Swift 6). Required because the SPM-resolved
    # firebase-ios-sdk uses the Swift 6 `sending` keyword, which Xcode 15 on
    # macos-14 can't parse ("Cannot find type 'sending' in scope"). Matches the
    # Xcode 16 toolchain used for local release builds.
    runs-on: macos-15
    timeout-minutes: 60

    defaults:
      run:
        working-directory: recycled_sound

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          set -euo pipefail
          XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Pin Swift Package Manager mode ON before pub get regenerates the iOS
      # scaffolding. The hybrid (Firebase + camera resolve via SPM; ML Kit, TFLite,
      # arkit_plugin via CocoaPods) depends on this flag, which is GLOBAL per-machine
      # and NOT tracked in the repo — a runner with it off would resolve Firebase +
      # camera back onto CocoaPods, a different dependency graph from the same source.
      # Pinning it makes the build reproducible. See docs/ios-dependency-strategy.md.
      - name: Pin Swift Package Manager mode
        run: flutter config --enable-swift-package-manager

      - name: Flutter pub get
        run: flutter pub get

      - name: Compute build number
        id: build-number
        run: |
          # Use github.run_number offset by the last manually-uploaded build (7).
          # Ensures monotonic increase past the 2026-04-06 manual TestFlight upload.
          BUILD_NUMBER=$((7 + ${{ github.run_number }}))
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Computed build number: ${BUILD_NUMBER}"

      - name: Import signing certificate
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode --output "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Prepend the build keychain to the user search list so codesign finds it.
          EXISTING_KEYCHAINS=$(security list-keychains -d user | tr -d '"' | xargs)
          # shellcheck disable=SC2086
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            --output "$PROFILES_DIR/recycled_sound_appstore.mobileprovision"

      - name: Build IPA
        run: |
          set -euo pipefail
          # Archive WITHOUT signing: automatic signing needs an Xcode-GUI account
          # that no CI runner has ("No Accounts" error). Sign manually at EXPORT
          # time via ios/ExportOptions.plist, against the distribution cert +
          # profile the earlier steps installed into the temp keychain / profiles
          # dir. No fallback — a missing ExportOptions.plist must fail loudly, not
          # silently degrade into a broken automatic-signing build.
          # Bake build identity so Device Info shows the ground-truth
          # commit/date regardless of the (often stale) pubspec version.
          GIT_SHA=$(git rev-parse --short HEAD)
          GIT_BUILD_DATE=$(date -u +%Y-%m-%d)
          echo "Stamping build: GIT_SHA=$GIT_SHA GIT_BUILD_DATE=$GIT_BUILD_DATE"
          flutter build ipa \
            --release \
            --build-number=${{ steps.build-number.outputs.build_number }} \
            --dart-define=GIT_SHA="$GIT_SHA" \
            --dart-define=GIT_BUILD_DATE="$GIT_BUILD_DATE" \
            --no-codesign
          ARCHIVE=$(find build/ios/archive -maxdepth 1 -name '*.xcarchive' | head -n1)
          if [ -z "$ARCHIVE" ]; then echo "No .xcarchive produced by flutter build" >&2; exit 1; fi
          echo "Exporting signed IPA from $ARCHIVE"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist
          ls -la build/ios/ipa

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode \
            --output "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          IPA_PATH=$(find build/ios/ipa -maxdepth 1 -name '*.ipa' | head -n1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/ios/ipa" >&2
            exit 1
          fi
          echo "Uploading $IPA_PATH"
          xcrun altool --upload-app --type ios \
            -f "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Clean up secrets on runner
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          rm -f "$RUNNER_TEMP/cert.p12" || true
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          rm -rf "$HOME/.appstoreconnect/private_keys" || true
