# tflite_flutter's Android module compiles Java at target 1.8 but Kotlin at 21,
# which Gradle 8 + JDK 21 rejects as inconsistent. On Android the JVM target is
# moot post-dexing (D8/R8 normalises everything to DEX), so we downgrade this
# third-party-plugin inconsistency from a hard error to a warning. This is the
# accepted fix for plugins we can't edit; it does NOT mask any issue in our code.
kotlin.jvm.target.validation.mode=warning
