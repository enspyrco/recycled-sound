name: recycled_sound
description: Community app for collecting, servicing, and redistributing donated hearing aids.
publish_to: 'none'
version: 0.5.0+57

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  cloud_functions: ^5.3.4
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^15.1.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  camera: ^0.11.1
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.1
  tflite_flutter: ^0.11.0
  image: ^4.5.3
  arkit_plugin: ^1.3.0
  vector_math: ^2.2.0
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.2
  battery_plus: ^6.2.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  fake_cloud_firestore: ^3.0.0
  firebase_storage_mocks: ^0.7.0
  firebase_auth_mocks: ^0.14.0
  # Used only by capture camera-lifecycle tests to install a fake
  # CameraPlatform (the seam the production code drives through).
  camera_platform_interface: ^2.12.0
  plugin_platform_interface: ^2.1.8
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  # Disable LLDB debug attach — works around the iOS 17+ shared-cache bug
  # where LLDB can't find libobjc.A.dylib on-disk, hangs debug start, and
  # blocks the Dart VM Service handshake (white screen + 60s timeout).
  # Profile/release builds unaffected.
  config:
    enable-lldb-debugging: false
  assets:
    - assets/device_db.bin
    - assets/device_catalog.json
    - assets/brand_classifier.tflite
    - assets/brand_classifier_labels.json
    - assets/custom_words.json
    - assets/capture_guide/
    - assets/capture_guide/aid_turntable/
    - assets/capture_guide/anim/

# Generates the real launcher icon (replaces the default Flutter blue-F that
# the Android-12 splash falls back to) from the brand mark. Run:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon_1024.png"
  adaptive_icon_background: "#277358"
  adaptive_icon_foreground: "assets/icon/app_icon_1024.png"

# Branded launch screen: forest-green background + the brand mark, instead of
# the default white screen. Run:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#277358"
  # White brand mark on transparent — shows against the green background.
  # (The full app_icon is a green tile, invisible on a green splash.)
  image: assets/icon/splash_mark.png
  android_12:
    image: assets/icon/splash_mark.png
    color: "#277358"
    icon_background_color: "#277358"
